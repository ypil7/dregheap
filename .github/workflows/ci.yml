name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_TARGET_DIR: target/ci

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Fetch dependencies
        run: cargo +stable fetch --locked

      - name: Build
        run: cargo +stable build --workspace --locked

      - name: Format
        run: cargo +nightly fmt --all -- --check

      - name: Lint
        run: cargo +stable clippy --workspace --all-targets --locked -- -D warnings

      - name: Unit tests
        run: cargo +stable test --workspace --lib --locked unit::
